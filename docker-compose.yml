volumes:
  data:
  logstash_sincedb:

name: skadi

services:

  # ── Setup: sets kibana_system password once ES is healthy ───────────────
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: skadi-setup
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    command: >
      bash -c '
        echo "Setting kibana_system password...";
        until curl -s -o /dev/null -u elastic:$$ELASTIC_PASSWORD http://elasticsearch:9200; do sleep 2; done;
        curl -s -X POST -u elastic:$$ELASTIC_PASSWORD http://elasticsearch:9200/_security/user/kibana_system/_password \
          -H "Content-Type: application/json" \
          -d "{\"password\":\"$$KIBANA_PASSWORD\"}";
        echo "Done.";
      '

  # ── Elasticsearch ───────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: skadi-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms${ES_HEAP} -Xmx${ES_HEAP}
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT}:9200"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health \
          | grep -qE '"status":"(green|yellow)"'
      interval: 20s
      timeout: 10s
      retries: 10

  # ── Kibana ──────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: skadi-kibana
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - SERVER_NAME=skadi-kibana
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "${KIBANA_PORT}:5601"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -s http://localhost:5601/api/status | grep -q '"level":"available"'
      interval: 30s
      timeout: 10s
      retries: 10

